<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
  </head>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: black;
      padding: 20px;
    }
    .logo {
      display: flex;
    }

    .menu {
      display: flex;
      gap: 30px;
    }

    .menu a {
      text-decoration: none;
      color: rgb(235, 230, 230);
      font-size: large;
    }

    .menu a:hover {
      color: yellow;
    }
    .hero {
      margin-bottom: 100px;
    }
    h1 {
      margin-top: 40px;
      padding: 12px 20px;
      border: none;
      padding-left: 65px;
      color: white;
      font-size: 20px;
      background: linear-gradient(to right, black, rgb(99, 66, 72), black);
    }
  </style>

  <body>
    <nav>
      <div class="logo">
        <img
          src="image/201.JPG"
          alt=""
          width="30px"
          style="border-radius: 40px"
        />
      </div>
      <div class="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>
    </nav>

    <section class="hero">
      <div
        id="carouselExampleInterval"
        class="carousel slide"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner">
          <div class="carousel-item active" data-bs-interval="10000">
            <img src="image/a.webp" class="d-block w-100" alt="..." />
          </div>
          <div class="carousel-item" data-bs-interval="2000">
            <img src="image/l.webp" class="d-block w-100" alt="..." />
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#carouselExampleInterval"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#carouselExampleInterval"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
      <h1>Classic Abaya Style</h1>
    </section>

    <div class="container-fluid">
      <div class="row g-4">
        <div class="col-12 col-sm-6 col-md-3">
          <div class="card animate__animated animate__backInLeft">
            <img src="image/21.webp" class="card-img-top" />
          </div>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
          <div class="card animate__animated animate__backInLeft">
            <img src="image/22.webp" class="card-img-top" />
          </div>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
          <div class="card animate__animated animate__backInLeft">
            <img src="image/23.webp" class="card-img-top" />
          </div>
        </div>

        <div class="col-12 col-sm-6 col-md-3">
          <div class="card animate__animated animate__backInLeft">
            <img src="image/24.webp" class="card-img-top" />
          </div>
        </div>
      </div>

      <h1>Premium Hijabs</h1>
      <div class="row">
        <div class="col-md-4">
          <div class="animate__animated animate__backInLeft">
            <img src="image/9.jfif" class="card-img-top" alt="..." />
            <div class="card-body"></div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="animate__animated animate__backInLeft">
            <img src="image/1.jfif" class="card-img-top" alt="..." />
            <div class="card-body"></div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="animate__animated animate__backInLeft">
            <img src="image/3.jfif" class="card-img-top" alt="..." />
            <div class="card-body"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</html>
