<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <STYLE>
        .BTN{
            padding: 12PX 30PX ;
            border: NONE ;
            color: white ;
            font-size: 16px ;
            border-radius:25px ;
            background: linear-gradient(to right,RED,ORANGE);
            transition:0.6s;
            
        }
        .BTN:hover{
            transform: scale(1.1);
            box-shadow:0 8px 20px rgba(0 ,0,0 ) ;
            color: rgb,(214, 241,7);
            background:rgb(185, 168, 14) ;
            border-radius:50% ;

            
        }
        .card{
            width:300px ;
            padding:20px ;
            border:2px solid black ;
            margin:20px ;
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow:0px 10px 25px ;
            display:inline-block ;
        }
        .card:hover{
            transform: scale(1.1);
            box-shadow:0 8px 20px rgba(0 ,0,0 ) ;
            color: rgb,(214, 241,7);
            background:blue ;
            border-radius:50% ;
             transition:0.6s;
            
        
        }
        LI{
            display:inline-block ;
            padding:10PX 20PX ;
            background:BLUE ;
            color:WHITE ;
            margin-left:10PX ;
        }
        LI:HOVER{
            
             transform: scale(1.1);
            box-shadow:0 8px 20px rgba(0 ,0,0 ) ;
            color: rgb,(214, 241,7);
            background:rgb(185, 168, 14) ;
            border-radius:50% ;
        }

    </STYLE>
</head>
<body>
    <button class="BTN">CLICK HERE </button>
    <div class="card">hello world</div>
    <ul>
        
        <li>HOME</li>
        <li>ABOUT</li>
        <li>SERVICES</li>
        <li>CONTACT</li>
    </ul>

</body>
</html>
