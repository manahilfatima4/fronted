<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    nav {
        display: flex;
        justify-content: space-between;
        background: black;
        padding: 20px;

    }

    .logo {
        display: flex;
        width: 50px;
        height: 50PX;
    }

    .menu {
        display: flex;
        gap: 50px;
    }

    .menu a {
        text-decoration: none;
        color: rgb(235, 230, 230);
        font-size: large;

    }

    .menu a:hover {
        color: yellow;
    }

    .hero {
        display: flex;
        justify-content: center;
        height: 300px;
        align-items: center;
        font-size: 60px;
        background: lightgray;



    }

    .cards {
        display: flex;
        justify-content: center;
        height: 300px;
        align-items: center;
        gap: 100px;




    }

    .card {
        display: flex;
        justify-content: center;
        border: 5px solid black;
        align-items: center;




    }
</style>

<body>
    <nav>
        <div class="logo"><img src="image/201.JPG"></div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>
    <h1>website</h1>
    <section class="hero">
        Welcome to our abaya shop

    </section>
    <div class="cards">
        <div class="card"><img src="image/22.webp" width="200px" height="200px"></div>
        <div class="card"><img src="image/21.webp" width="200px" height="200px"></div>
        <div class="card"><img src="image/23.webp" width="200px" height="200px"></div>
    </div>
</body>

</html>
