<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }


        header {

            background-color: blue;
            color: white;
            padding: 20px 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            overflow: hidden;

        }

        #logo {
            float: left;
            font-size: 2.5em;
        }

        nav {
            float: right;
        }

        .nav-links {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            display: inline;
            margin-left: 0px;
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: inline-block;
            font-size: 1.5em;
            transition: background-color 0.3s;
        }

        .nav-links li a:hover {
            background-color: rgb(59, 11, 192);
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <div id="logo">
                <img src="image/"
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#"> HOME</a></li>
                    <li><a href="#"> ABOUT</a></li>
                    <li><a href="#"> CONTACT</a></li>
                    <li><a href="#"> SERVICE</a></li>

                </ul>
            </nav>
        </div>
    </header>

     
</body>

</html>
